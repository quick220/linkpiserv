user www-data www-data;
worker_processes  auto;
worker_priority	0;

#error_log  /tmp/log/nginx.error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    
    log_format access '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for"';
    #open_log_file_cache max=1000 inactive=20s min_uses=1 valid=1m;
#    error_log  /tmp/log/nginx.error.log debug;
#    access_log  /tmp/log/access.log;
    sendfile        on;
    #tcp_nopush     on;
    client_max_body_size 100m;
    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

	add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Headers X-Requested-With;
    add_header Access-Control-Allow-Methods GET,POST,OPTIONS;

 server {
        listen       8888;
        server_name  127.0.0.1;

        # rtmp stat
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location /stat.xsl {
            root /usr/nginx;
        }

        # rtmp control
        location /control {
            rtmp_control all;
        }
    }

    server {
        listen       80;
        server_name  127.0.0.1;



        location / {
            ssi on;
            root   /link/web;
            index  index.php;
        }
        
	location /RPC {
	    proxy_pass      http://127.0.0.1:8080/RPC;
	    proxy_max_temp_file_size 0m;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Headers X-Requested-With,content-type;
            add_header Access-Control-Allow-Methods GET,POST,OPTIONS;
	}
	
        
        location /hls/ {
            alias /tmp/hls/;
        }
        
        location /config/ {
            alias /link/config/;
			add_header Cache-Control no-store;
        }

        
        location /res/ {
            alias /link/res/;
            autoindex on;
            autoindex_format json;
        }

	
        
        
        location /live/ {
       	    rewrite '^/live/(.*)$' http://$host:8090/$1 permanent;
        }

	location /flv {
            flv_live on;
        }

	location ~\.php$ {
            root           /link/web;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            index index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
	    include        fastcgi.conf;
        }
	
    }

}

include /link/config/rtmp.conf;

